<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Trắc Nghiệm Lịch Sử Đảng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .chapter-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        .quiz-content {
            padding: 30px;
        }

        .question-number {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #555;
            background: #f8f9fa;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .prev-btn {
            background: #6c757d;
            color: white;
        }

        .prev-btn:hover:not(:disabled) {
            background: #5a6268;
        }

        .next-btn {
            background: #667eea;
            color: white;
        }

        .next-btn:hover:not(:disabled) {
            background: #5568d3;
        }

        .submit-btn {
            background: #28a745;
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            background: #218838;
        }

        .progress {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-text {
            font-size: 16px;
            color: #66666;
        }

        .progress-bar {
            width: 200px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .score-display {
            text-align: center;
            padding: 40px;
        }

        .score-display h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }

        .score-number {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-details {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .chapter-select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            margin-right: 15px;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 18px;
            }

            .navigation {
                flex-direction: column;
                gap: 15px;
            }

            .progress-bar {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bài Trắc Nghiệm Lịch Sử Đảng</h1>
            <div class="chapter-badge" id="chapterBadge">Chương 1</div>
        </div>

        <div class="quiz-content" id="quizContent">
            <div class="question-number" id="questionNumber">Câu 1/170</div>
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="navigation" id="navigation">
            <div class="progress">
                <span class="progress-text" id="progressText">0%</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div>
                <select class="chapter-select" id="chapterSelect" onchange="goToChapter()">
                    <option value="all">Tất cả chương</option>
                    <option value="1">Chương 1</option>
                    <option value="2">Chương 2</option>
                    <option value="3">Chương 3</option>
                </select>
                <button class="nav-btn prev-btn" id="prevBtn" onclick="prevQuestion()">← Câu trước</button>
                <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()">Câu sau →</button>
                <button class="nav-btn submit-btn" id="submitBtn" onclick="submitQuiz()" style="display: none;">Nộp bài</button>
            </div>
        </div>

        <div class="score-display" id="scoreDisplay" style="display: none;">
            <h2>Kết quả của bạn</h2>
            <div class="score-number" id="scoreNumber">0/170</div>
            <div class="score-details">
                <p>Số câu đúng: <strong id="correctCount">0</strong></p>
                <p>Số câu sai: <strong id="incorrectCount">0</strong></p>
                <p>Tỷ lệ đúng: <strong id="percentage">0%</strong></p>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">Làm lại từ đầu</button>
        </div>
    </div>

    <script>
        const quizData = {
            "Chương 1": [
                {
                    question: "Cuối thế kỷ XIX, đầu thế kỷ XX, nhiệm vụ hàng đầu cần phải được giải quyết cấp thiết của cách mạng Việt Nam là gì?",
                    options: ["Canh tân đất nước", "Giải phóng dân tộc", "Đấu tranh giai cấp", "Cả ba phương án kia đều đúng"],

                },

                    correct: 3
                },
                {
                    question: "Phong trào yêu nước chống Pháp nào sau đây theo hệ tư tưởng phong kiến?",

                    correct: 1
                },
                {
                    question: "Hoàn cảnh quốc tế cuối thế kỷ XIX, đầu thế kỷ XX có những điểm nổi bật nào?",

                {

                    correct: 3
                },
                {
                    question: "Sự kiện nào đánh dấu bước ngoặt trong cuộc đời hoạt động cách mạng của Nguyễn Ái Quốc - từ người yêu nước trở thành người cộng sản?",
                    options: ["Nguyễn Ái Quốc bỏ phiếu tán thành việc gia nhập Quốc tế III và tham gia thành lập Đảng Cộng sản Pháp", "Nguyễn Ái Quốc đọc bản Sơ thảo lần thứ nhất những luận cương về vấn đề dân tộc và vấn đề thuộc địa của Lênin", "Nguyễn Ái Quốc gửi Bản yêu sách của nhân dân An Nam tới Hội nghị Versailles", "Nguyễn Ái Quốc viết tác phẩm 'Bản án chế độ thực dân Pháp'"],

                {

                    correct: 3
                },
                {
                    question: "Phong trào đình công, bãi công của công nhân Việt Nam trong những năm 1926 - 1929 thuộc khuynh hướng nào?",
                    options: ["Khuynh hướng vô sản", "Khuynh hướng dân chủ tư sản", "Khuynh hướng phong kiến", "Khuynh hướng vô sản và khuynh hướng dân chủ tư sản"],

                    options: ["Hoàn thành cách mạng dân tộc dân chủ nhân dân để đi lên chủ nghĩa xã hội", "Làm cách mạng giải phóng dân tộc sau đó đi lên chủ nghĩa xã hội", "Làm cách mạng tư sản dân quyền và thổ địa cách mạng để đi tới xã hội cộng sản", "Làm cách mạng điền địa để đi tới xã hội cộng sản"],

                },
                {
                    question: "Sự ra đời của Đảng Cộng sản Việt Nam là sự kết hợp của các yếu tố nào?",

                    correct: 3
                },
                {
                    question: "Đại hội nào của Đảng Cộng sản Việt Nam đánh dấu thời kỳ đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước?",
                    options: ["Đại hội VI của Đảng (1986)", "Đại hội VII của Đảng (1991)", "Đại hội VIII của Đảng (1996)", "Đại hội IX của Đảng (2001)"],
                    correct: 2
                },
                {
                    question: "Trong nền kinh tế nhiều thành phần ở Việt Nam hiện nay, thành phần kinh tế nào đóng vai trò chủ đạo, là công cụ chủ yếu để Nhà nước điều tiết nền kinh tế?",
                    options: ["Kinh tế tư nhân", "Kinh tế nhà nước", "Kinh tế có vốn đầu tư nước ngoài", "Kinh tế tập thể"],
                    correct: 1
                },
                {
                    question: "Mốc thời gian đánh dấu thắng lợi cuộc chiến tranh bảo vệ biên giới Tây Nam Việt Nam và cùng quân dân Campuchia chiến thắng chế độ diệt chủng là:",
                    options: ["Ngày 1/7/1979", "Ngày 7/1/1979", "Ngày 7/1/1978", "Ngày 1/7/1978"],
                    correct: 1
                },
                {
                    question: "Quan điểm của Đảng về chức năng, vị trí, vai trò đặc biệt quan trọng của văn hóa đối với sự phát triển xã hội là:",
                    options: ["Văn hóa là nền tảng tinh thần của xã hội, vừa là mục tiêu, vừa là động lực thúc đẩy sự phát triển kinh tế - xã hội và hội nhập quốc tế", "Nền văn hóa mà chúng ta đang xây dựng là nền văn hóa tiên tiến, đậm đà bản sắc dân tộc", "Nền văn hóa Việt Nam là nền văn hóa thống nhất mà đa dạng trong cộng đồng các dân tộc Việt Nam", "Xây dựng và phát triển văn hóa là sự nghiệp của toàn dân do Đảng lãnh đạo, trong đó đội ngũ trí thức giữ vai trò quan trọng"],
                    correct: 0
                }
            ]
        };

        let currentChapter = "Chương 1";
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let allQuestions = [];
        let filteredQuestions = [];

        // Flatten all questions
        function initializeQuestions() {
            allQuestions = [];
            Object.keys(quizData).forEach(chapter => {
                quizData[chapter].forEach((q, index) => {
                    allQuestions.push({
                        ...q,
                        chapter: chapter,
                        originalIndex: index
                    });
                });
            });
            filteredQuestions = [...allQuestions];
        }

        function getChapterFromQuestion(question) {
            return question.chapter;
        }

        function updateChapterBadge() {
            if (filteredQuestions.length > 0) {
                const currentQuestion = filteredQuestions[currentQuestionIndex];
                const chapter = getChapterFromQuestion(currentQuestion);
                document.getElementById('chapterBadge').textContent = chapter;
            }
        }

        function loadQuestion() {
            const question = filteredQuestions[currentQuestionIndex];
            document.getElementById('questionNumber').textContent = `Câu ${currentQuestionIndex + 1}/${filteredQuestions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
                optionElement.onclick = () => selectOption(index);
                
                if (userAnswers[currentQuestionIndex] === index) {
                    optionElement.classList.add('selected');
                }
                
                optionsContainer.appendChild(optionElement);
            });

            // Hide feedback
            document.getElementById('feedback').style.display = 'none';

            updateChapterBadge();
            updateProgress();
            updateNavigationButtons();
        }

        function selectOption(index) {
            userAnswers[currentQuestionIndex] = index;
            
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) {
                    opt.classList.add('selected');
                }
            });

            // Show feedback
            const question = filteredQuestions[currentQuestionIndex];
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            if (index === question.correct) {
                feedback.className = 'feedback correct';
                feedback.textContent = 'Chính xác!';
            } else {
                feedback.className = 'feedback incorrect';
                feedback.textContent = `Sai rồi! Đáp án đúng là: ${String.fromCharCode(65 + question.correct)}. ${question.options[question.correct]}`;
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < filteredQuestions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / filteredQuestions.length) * 100;
            document.getElementById('progressText').textContent = `${Math.round(progress)}%`;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function updateNavigationButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === filteredQuestions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'inline-block';
            } else {
                document.getElementById('nextBtn').style.display = 'inline-block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }

        function goToChapter() {
            const selectedChapter = document.getElementById('chapterSelect').value;
            
            if (selectedChapter === 'all') {
                filteredQuestions = [...allQuestions];
            } else {
                filteredQuestions = allQuestions.filter(q => q.chapter === `Chương ${selectedChapter}`);
            }
            
            currentQuestionIndex = 0;
            userAnswers = {};
            loadQuestion();
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;
            
            filteredQuestions.forEach((question, index) => {
                if (userAnswers[index] === question.correct) {
                    correct++;
                } else {
                    incorrect++;
                }
            });

            const percentage = Math.round((correct / filteredQuestions.length) * 100);
            
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('navigation').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'block';
            document.getElementById('scoreNumber').textContent = `${correct}/${filteredQuestions.length}`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('incorrectCount').textContent = incorrect;
            document.getElementById('percentage').textContent = `${percentage}%`;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = {};
            filteredQuestions = [...allQuestions];
            document.getElementById('chapterSelect').value = 'all';
            
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('navigation').style.display = 'flex';
            document.getElementById('scoreDisplay').style.display = 'none';
            
            loadQuestion();
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            initializeQuestions();
            loadQuestion();
        });
    </script>
</body>
</html>
